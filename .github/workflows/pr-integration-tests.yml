name: PR Integration Tests

concurrency:
  group: pr-integration-${{ github.event.issue.number }}
  cancel-in-progress: true

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare-integration-branch:
    if: github.event.issue.pull_request && github.event.comment.body == '/run-integration-tests'
    runs-on: ubuntu-latest

    steps:
      - name: Validate trigger and prepare integration branch
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const association = context.payload.comment.author_association;
            const allowedAssociations = ['OWNER', 'MEMBER', 'COLLABORATOR'];

            if (!allowedAssociations.includes(association)) {
              core.setFailed(`Comment author association '${association}' is not allowed to run integration tests.`);
              return;
            }

            const { owner, repo } = context.repo;
            const pullNumber = context.payload.issue.number;
            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            if (pull.state !== 'open') {
              core.setFailed(`Pull request #${pull.number} is not open.`);
              return;
            }

            const branchName = `ci/pr-${pull.number}-integration`;
            const mergeRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `pull/${pull.number}/merge`,
            });

            const mergeSha = mergeRef.data.object.sha;
            const fullRef = `refs/heads/${branchName}`;

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: fullRef,
                sha: mergeSha,
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }

              await github.rest.git.updateRef({
                owner,
                repo,
                ref: `heads/${branchName}`,
                sha: mergeSha,
                force: true,
              });
            }

            core.setOutput('pull_number', String(pull.number));
            core.setOutput('merge_ref', `refs/pull/${pull.number}/merge`);
            core.setOutput('merge_sha', mergeSha);
            core.setOutput('branch_name', branchName);

      - name: Add reaction
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket',
              });
            } catch (error) {
              core.warning(`Failed to add reaction: ${error.message}`);
            }

      - name: Comment queued run
        if: steps.pr.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Queued integration tests for merge ref \`${{ steps.pr.outputs.merge_ref }}\` on branch \`${{ steps.pr.outputs.branch_name }}\` at commit \`${{ steps.pr.outputs.merge_sha }}\`. Check the Build workflow run for results.`,
              });
            } catch (error) {
              core.warning(`Failed to comment with queue details: ${error.message}`);
            }
